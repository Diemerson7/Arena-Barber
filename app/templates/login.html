{% extends "base.html" %}

{% block content %}
<section class="h-screen flex items-center justify-center px-4 pt-20">
    <div class="max-w-md w-full bg-[#0a0a0a] p-10 rounded-3xl border border-white/5 shadow-2xl">
        
        <div class="text-center mb-10">
            <div class="inline-block p-4 rounded-full bg-cyan-400/10 mb-4">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-cyan-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
            </div>
            <h2 class="text-3xl font-bold tracking-tight uppercase">Acesse sua <br><span class="text-cyan-400 italic">Conta</span></h2>
        </div>

        <form method="POST" class="space-y-5">
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[2px] mb-2 text-gray-500">Usuário ou E-mail</label>
                <input type="text" name="username" required 
                       class="w-full bg-black border border-white/10 p-4 rounded-xl focus:border-cyan-400 outline-none transition text-white placeholder-gray-700"
                       placeholder="Seu usuário">
            </div>
            
            <div>
                <label class="block text-[10px] font-bold uppercase tracking-[2px] mb-2 text-gray-500">Sua Senha</label>
                <input type="password" name="password" required 
                       class="w-full bg-black border border-white/10 p-4 rounded-xl focus:border-cyan-400 outline-none transition text-white placeholder-gray-700"
                       placeholder="••••••••">
            </div>

            <button type="submit" class="w-full btn-arena py-4 mt-4">Entrar</button>
        </form>

        <!-- Link para Cadastro -->
        <div class="mt-8 pt-6 border-t border-white/5 text-center">
            <p class="text-gray-500 text-sm">Novo na Arena Barber?</p>
            <a href="/cadastro" class="text-cyan-400 font-bold uppercase text-xs tracking-widest hover:underline mt-2 inline-block">
                Crie sua conta agora
            </a>
        </div>

    </div>
</section>
{% endblock %}
